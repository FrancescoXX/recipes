project:
  name: rust-hello-world-small-production

services:
  # Production app — two containers minimum for zero-downtime deployments.
  # When you deploy a new version, Zerops starts new containers alongside the
  # running ones, only switching traffic once the readiness check passes.
  # minContainers: 2 ensures this handoff always has a warm container to replace.
  - hostname: app
    type: rust@stable
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/rust-hello-world-app
    enableSubdomainAccess: true
    minContainers: 2
    verticalAutoscaling:
      minRam: 0.25
      # Reserve ~40% of minRam as free headroom. Rust has no GC, but actix-web
      # spawns worker threads per CPU core and each request allocates on the heap.
      # Without this reserve, a traffic spike can exhaust RAM and trigger an OOM kill.
      minFreeRamGB: 0.1

  # Deploy PostgreSQL database for app data.
  # Priority 10 ensures the database starts before app containers, preventing
  # connection errors during deployment. This pattern applies to all data services.
  - hostname: db
    type: postgresql@17
    mode: NON_HA
    priority: 10
