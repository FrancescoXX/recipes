# Zerops project import for the Rust Hello World Highly-available Production environment.
# Enterprise-grade configuration: Serious core package, dedicated CPU cores, HA database
# with streaming replication, and horizontally scaled app containers.

project:
  name: rust-hello-world-highly-available-production
  # Serious core provides a dedicated hardware node for the project balancer and internal
  # routing infrastructure. Lightweight (default) is shared and sufficient for development
  # or small production; Serious eliminates noisy-neighbor effects for enterprise workloads.
  # Docs: https://docs.zerops.io/features/infrastructure#project-core-options
  corePackage: SERIOUS

services:
  # Production app — dedicated CPU cores, two minimum containers, generous RAM reserve.
  # cpuMode: DEDICATED allocates exclusive vCPU cores to this service, preventing other
  # tenants from affecting response latency during CPU-intensive request handling.
  - hostname: app
    type: rust@stable
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/rust-hello-world-app
    enableSubdomainAccess: true
    minContainers: 2
    cpuMode: DEDICATED
    verticalAutoscaling:
      minRam: 0.5
      # Reserve ~40% free RAM — higher baseline for enterprise traffic patterns
      # and to absorb connection pool growth during load spikes.
      minFreeRamGB: 0.25

  # Deploy PostgreSQL database with high-availability replication.
  # mode: HA provisions a primary and at least one replica with automatic failover,
  # eliminating the database as a single point of failure.
  # Priority 10 ensures data services start before app containers, preventing
  # connection errors during deployment. This pattern applies to all data services.
  - hostname: db
    type: postgresql@17
    mode: HA
    priority: 10
    cpuMode: DEDICATED
    verticalAutoscaling:
      minRam: 1
      # HA PostgreSQL runs WAL shipping and replication concurrently with query serving —
      # reserve RAM for replication overhead on top of query workload.
      minFreeRamGB: 0.5
