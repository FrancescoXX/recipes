project:
  name: rust-hello-world-highly-available-production
  # Serious core allocates dedicated infrastructure for this project,
  # eliminating resource contention with other projects on the platform.
  # Use this for production workloads with SLA requirements.
  corePackage: SERIOUS

services:
  # HA production app — dedicated CPU cores ensure consistent latency.
  # DEDICATED mode reserves vCPUs exclusively for this service (no sharing with
  # other containers on the same host), which eliminates CPU steal and
  # jitter caused by noisy neighbours.
  - hostname: app
    type: rust@stable
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/rust-hello-world-app
    enableSubdomainAccess: true
    minContainers: 2
    cpuMode: DEDICATED
    verticalAutoscaling:
      # Higher minRam for HA production — more headroom for concurrent requests
      # across multiple containers. Rust is memory-efficient but actix-web's
      # thread-per-core model plus connection buffers add up under load.
      minRam: 0.5
      # ~50% free RAM reserve at this tier — leaves room for request bursts,
      # Tokio runtime overhead, and memory fragmentation in long-running processes.
      minFreeRamGB: 0.25

  # HA PostgreSQL database — data is replicated across multiple nodes.
  # In NON_HA mode, a database node failure causes downtime while Zerops
  # restarts it. In HA mode, a replica promotes to primary automatically,
  # keeping the application connected with no manual intervention.
  # Priority 10 ensures the database starts before app containers, preventing
  # connection errors during deployment. This pattern applies to all data services.
  - hostname: db
    type: postgresql@17
    mode: HA
    priority: 10
    cpuMode: DEDICATED
    verticalAutoscaling:
      # HA database requires more RAM: primary + replica both run on the same
      # vertical autoscaling budget, and the WAL replication stream adds overhead.
      minRam: 1
